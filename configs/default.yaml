# پیکربندی پیش‌فرض I-JEPA (بخش ۱۱).
# همه‌ی هایپرپارامترها در یک‌جا قرار دارند تا `train.py` هرگز پیش‌فرض‌های عددی را هاردکد نکند.

data:
  root: null                 # مسیر پوشه‌ی تصاویر محلی؛ اگر null باشد / use_synthetic=true باشد، SyntheticDataset استفاده می‌شود
  img_size: 224
  patch_size: 16              # grid = 224/16 = 14x14 = 196 پچ
  use_synthetic: true          # وقتی یک پوشه‌ی تصویر محلی واقعی در `root` فراهم شد، به false تغییر دهید
  synthetic_num_samples: 256
  num_workers: 4

model:
  encoder_name: vit_small      # یکی از: vit_small, vit_base, vit_large, vit_huge (جدول بخش ۲)
  predictor_embed_dim: 384
  predictor_depth: 6
  predictor_num_heads: 12
  predictor_mlp_ratio: 4

mask:
  num_target_blocks: 4
  target_scale: [0.15, 0.20]
  context_scale: [0.85, 1.0]
  aspect_ratio_range: [0.75, 1.5]
  min_keep_patches: 10
  allow_overlap: false

ema:
  m_start: 0.996                # بازه‌ی تایید‌شده و استاندارد به‌سبک I-JEPA/BYOL
  m_end: 1.0

optim:
  base_lr: 0.001                 # نرخ یادگیری مرجع در batch_size == reference_batch_size (بخش ۷)
  reference_batch_size: 256      # lr = base_lr * batch_size / reference_batch_size
  warmup_epoch_fraction: 0.15    # ۱۵٪ از کل epoch‌ها، طبق بخش ۷
  final_lr_fraction: 0.05        # کسینوسی تا final_lr_fraction * scaled_lr کاهش می‌یابد
  wd_start: 0.04                 # پیش‌فرض معقول/قابل‌پیکربندی (نه یک ثابت تایید‌شده‌ی مقاله)
  wd_end: 0.4                    # پیش‌فرض معقول/قابل‌پیکربندی (نه یک ثابت تایید‌شده‌ی مقاله)
  betas: [0.9, 0.999]

train:
  batch_size: 32
  epochs: 100
  seed: 42
  use_bf16: true                 # اگر روی این دستگاه پشتیبانی نشود، خودکار به float32 بازمی‌گردد
  checkpoint_dir: ./checkpoints
  checkpoint_every: 1
  log_every: 50
